docs_dir: "docs/"
naming_pattern: "{num:03d}-{method}-{phase}-{slug}.md"

numbering:
  strategy: sequential
  start: 1
  padding: 3
  presets: [bmad]
  phase_validation: warn

slug:
  language: preserve
  separator: "-"
  lowercase: true
  max_length: 50

migration:
  default_order: mtime
  safety:
    dry_run_default: true
    backup_dir: ".docs-numbering/backup"

history:
  enabled: true
  max_entries: 100
  retain_days: 30
